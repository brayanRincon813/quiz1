<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-2">
            <ol class="breadcrumb breadcrumb-dark mb-0">
                <li class="breadcrumb-item">
                    <a th:href="@{/entrenador/listar}"><i class="bi bi-person-badge-fill me-1"></i>Entrenadores</a>
                </li>
                <li class="breadcrumb-item active" th:text="${titulo}"></li>
            </ol>
        </nav>
        <h1 th:text="${titulo}">Entrenador</h1>
        <p>Completa los campos requeridos marcados con <span style="color:#f87171">*</span></p>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card card-form p-4">
                <form th:action="@{/entrenador/guardar}" th:object="${entrenador}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <p class="section-title"><i class="bi bi-person-badge me-1"></i>Información personal</p>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label">
                                <i class="bi bi-person"></i> Nombre <span class="required-star">*</span>
                            </label>
                            <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej: Carlo">
                            <span class="text-danger small d-block mt-1" th:errors="*{nombre}"></span>
                        </div>
                        <div class="col-6">
                            <label class="form-label">
                                <i class="bi bi-person"></i> Apellido <span class="required-star">*</span>
                            </label>
                            <input type="text" class="form-control" th:field="*{apellido}" placeholder="Ej: Ancelotti">
                            <span class="text-danger small d-block mt-1" th:errors="*{apellido}"></span>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-4">
                            <label class="form-label">
                                <i class="bi bi-calendar"></i> Edad
                            </label>
                            <input type="number" class="form-control" th:field="*{edad}"
                                   min="18" max="99" placeholder="52">
                        </div>
                        <div class="col-8">
                            <label class="form-label">
                                <i class="bi bi-globe"></i> Nacionalidad
                            </label>
                            <input type="text" class="form-control" th:field="*{nacionalidad}"
                                   placeholder="Ej: Italiano">
                        </div>
                    </div>

                    <div class="d-flex gap-2 pt-2 border-top">
                        <button type="submit" class="btn btn-success flex-grow-1">
                            <i class="bi bi-check-lg me-1"></i>Guardar
                        </button>
                        <a th:href="@{/entrenador/listar}" class="btn btn-outline-secondary flex-grow-1">
                            <i class="bi bi-x-lg me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout/base :: footer}"></footer>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
