<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-2">
            <ol class="breadcrumb breadcrumb-dark mb-0">
                <li class="breadcrumb-item">
                    <a th:href="@{/asociacion/listar}"><i class="bi bi-building-fill me-1"></i>Asociaciones</a>
                </li>
                <li class="breadcrumb-item active" th:text="${titulo}"></li>
            </ol>
        </nav>
        <h1 th:text="${titulo}">Asociación</h1>
        <p>Completa los campos requeridos marcados con <span style="color:#f87171">*</span></p>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card card-form p-4">
                <form th:action="@{/asociacion/guardar}" th:object="${asociacion}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <p class="section-title"><i class="bi bi-building me-1"></i>Datos de la asociación</p>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-card-text"></i> Nombre
                            <span class="required-star">*</span>
                        </label>
                        <input type="text" class="form-control" th:field="*{nombre}"
                               placeholder="Ej: Federación Colombiana de Fútbol">
                        <span class="text-danger small d-block mt-1" th:errors="*{nombre}"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-geo-alt"></i> País
                            <span class="required-star">*</span>
                        </label>
                        <input type="text" class="form-control" th:field="*{pais}"
                               placeholder="Ej: Colombia">
                        <span class="text-danger small d-block mt-1" th:errors="*{pais}"></span>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-person"></i> Presidente
                        </label>
                        <input type="text" class="form-control" th:field="*{presidente}"
                               placeholder="Ej: Ramón Jesurún">
                    </div>

                    <div class="d-flex gap-2 pt-2 border-top">
                        <button type="submit" class="btn btn-success flex-grow-1">
                            <i class="bi bi-check-lg me-1"></i>Guardar
                        </button>
                        <a th:href="@{/asociacion/listar}" class="btn btn-outline-secondary flex-grow-1">
                            <i class="bi bi-x-lg me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout/base :: footer}"></footer>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
