<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<div class="page-header">
    <div class="container">
        <div class="d-flex align-items-center gap-3">
            <div class="ph-icon-box"><i class="bi bi-trophy-fill"></i></div>
            <div>
                <h1>Competiciones</h1>
                <p>Torneos y ligas en los que participan los clubes</p>
            </div>
        </div>
    </div>
</div>

<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="stat-badge">
            <span class="dot"></span>
            <span th:text="${#lists.size(competiciones)} + ' registros'">0 registros</span>
        </div>
        <a th:href="@{/competicion/nuevo}" class="btn btn-new">
            <i class="bi bi-plus-lg me-1"></i>Nueva Competición
        </a>
    </div>

    <div class="card-main">
        <table th:if="${not #lists.isEmpty(competiciones)}" class="table">
            <thead>
            <tr>
                <th><i class="bi bi-hash me-1"></i>ID</th>
                <th><i class="bi bi-trophy me-1"></i>Nombre</th>
                <th><i class="bi bi-currency-dollar me-1"></i>Premio</th>
                <th><i class="bi bi-calendar-event me-1"></i>Inicio</th>
                <th><i class="bi bi-calendar-check me-1"></i>Fin</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${competiciones}">
                <td><span class="id-pill" th:text="${c.id}"></span></td>
                <td>
                    <span class="fw-semibold d-flex align-items-center gap-2">
                        <i class="bi bi-trophy-fill text-warning opacity-75" style="font-size:.85rem"></i>
                        <span th:text="${c.nombre}"></span>
                    </span>
                </td>
                <td>
                    <span th:if="${c.montoPremio > 0}"
                          class="tag-teal"
                          th:text="'$ ' + ${#numbers.formatInteger(c.montoPremio, 1, 'COMMA')}">
                    </span>
                    <span th:if="${c.montoPremio == 0}" class="text-muted small">—</span>
                </td>
                <td>
                    <span th:if="${c.fechaInicio != null}" th:text="${c.fechaInicio}" class="small"></span>
                    <span th:if="${c.fechaInicio == null}" class="text-muted small">—</span>
                </td>
                <td>
                    <span th:if="${c.fechaFin != null}" th:text="${c.fechaFin}" class="small"></span>
                    <span th:if="${c.fechaFin == null}" class="text-muted small">—</span>
                </td>
                <td>
                    <div class="d-flex gap-1">
                        <a th:href="@{/competicion/editar/{id}(id=${c.id})}"
                           class="btn btn-primary btn-sm">
                            <i class="bi bi-pencil-fill me-1"></i>Editar
                        </a>
                        <a th:href="@{/competicion/eliminar/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Eliminar esta competición?')">
                            <i class="bi bi-trash3-fill me-1"></i>Eliminar
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(competiciones)}" class="empty-wrap">
            <div class="empty-circle"><i class="bi bi-trophy-fill"></i></div>
            <p class="empty-title">Sin competiciones registradas</p>
            <p class="empty-sub">Crea torneos para que los clubes puedan participar</p>
            <a th:href="@{/competicion/nuevo}" class="btn btn-new">
                <i class="bi bi-plus-lg me-1"></i>Crear competición
            </a>
        </div>
    </div>
</div>

<footer th:replace="~{layout/base :: footer}"></footer>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
