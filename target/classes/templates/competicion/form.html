<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-2">
            <ol class="breadcrumb breadcrumb-dark mb-0">
                <li class="breadcrumb-item">
                    <a th:href="@{/competicion/listar}"><i class="bi bi-trophy-fill me-1"></i>Competiciones</a>
                </li>
                <li class="breadcrumb-item active" th:text="${titulo}"></li>
            </ol>
        </nav>
        <h1 th:text="${titulo}">Competición</h1>
        <p>Completa los campos requeridos marcados con <span style="color:#f87171">*</span></p>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card card-form p-4">
                <form th:action="@{/competicion/guardar}" th:object="${competicion}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <p class="section-title"><i class="bi bi-trophy me-1"></i>Datos del torneo</p>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-card-text"></i> Nombre <span class="required-star">*</span>
                        </label>
                        <input type="text" class="form-control" th:field="*{nombre}"
                               placeholder="Ej: Liga BetPlay Dimayor">
                        <span class="text-danger small d-block mt-1" th:errors="*{nombre}"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-currency-dollar"></i> Monto Premio
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" th:field="*{montoPremio}"
                                   min="0" placeholder="500000000">
                        </div>
                    </div>

                    <p class="section-title mt-4"><i class="bi bi-calendar-range me-1"></i>Fechas</p>

                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label class="form-label">
                                <i class="bi bi-calendar-event"></i> Inicio
                            </label>
                            <input type="date" class="form-control" th:field="*{fechaInicio}">
                        </div>
                        <div class="col-6">
                            <label class="form-label">
                                <i class="bi bi-calendar-check"></i> Fin
                            </label>
                            <input type="date" class="form-control" th:field="*{fechaFin}">
                        </div>
                    </div>

                    <div class="d-flex gap-2 pt-2 border-top">
                        <button type="submit" class="btn btn-success flex-grow-1">
                            <i class="bi bi-check-lg me-1"></i>Guardar
                        </button>
                        <a th:href="@{/competicion/listar}" class="btn btn-outline-secondary flex-grow-1">
                            <i class="bi bi-x-lg me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout/base :: footer}"></footer>
<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
